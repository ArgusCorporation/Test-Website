<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Argus Corporation</title>

    <link rel="icon" href="favicon.png">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d0d0d;
            color: white;
            text-align: center;
        }

        header {
            padding: 60px 20px;
            background: linear-gradient(135deg, #111, #1f1f1f);
        }

        h1 {
            font-size: 48px;
            margin: 0;
        }

        p {
            color: #aaa;
            font-size: 18px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #4f46e5;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .btn:hover {
            background: #3730a3;
        }

        section {
            padding: 60px 20px;
        }

        .card {
            background: #1a1a1a;
            padding: 20px;
            margin: 10px auto;
            max-width: 600px;
            border-radius: 10px;
        }

        footer {
            padding: 20px;
            color: #666;
        }
    </style>
</head>

<body>

<header>
    <h1>Argus Corporation</h1>
    <p>Next-Gen Game & Software Studio</p>
    <a class="btn" href="https://discord.gg/" target="_blank">Join Discord</a>
</header>

<section>
    <div class="card">
        <h2>Über uns</h2>
        <p>Wir entwickeln Games, Systeme und immersive digitale Welten.</p>
    </div>

    <div class="card">
        <h2>Projekte</h2>
        <p>Hier entstehen unsere aktuellen Spiele und Tools.</p>
    </div>

    <div class="card">
        <h2>Karriere</h2>
        <p>Bewirb dich und werde Teil des Teams.</p>
    </div>
</section>

<footer>
    © 2026 Argus Corporation
</footer>

</body>
</html>
